name: Deploy testing preview to GitHub Pages

on:
  push:
    branches:
      - main
      - codex/host-testing-preview
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Remove server-only routes for the static preview
        # GitHub Pages only serves static files, so Google sign-in and the
        # Drive-backed document API (which need a real Node.js server, and
        # aren't available on this preview anyway) would otherwise make
        # `next build --output export` fail. This only affects this
        # ephemeral CI checkout, not the repository or the Vercel build.
        run: rm -rf app/api

      - name: Build static preview
        run: pnpm build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
